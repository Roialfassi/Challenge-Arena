<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C# Challenge Arena</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>C<span>#</span> Challenge Arena</h1>
        <p>60 challenges across 10 levels — Arrays, Loops, While Loops &amp; Functions</p>
      </div>
      <div class="header-right">
        <button class="mode-btn active" id="modeLib" onclick="setMode('library')">Library</button>
        <button class="mode-btn" id="modePrac" onclick="setMode('practice')">Practice</button>
      </div>
    </div>
  </header>

  <div class="app" id="libraryView">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content">
      <div class="content-header">
        <h2 id="contentTitle">All Challenges</h2>
        <span class="result-count" id="resultCount"></span>
      </div>
      <div class="challenge-list" id="challengeList"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="es-icon">?</div>
        <p>No challenges match your filters.</p>
      </div>
    </main>
  </div>

  <div class="practice-view" id="practiceView">
    <div class="prac-start" id="pracStart">
      <h2>Practice Mode</h2>
      <p>Pick a starting level. After each challenge, go harder, stay, or go easier.</p>
      <div class="level-grid" id="levelGrid"></div>
    </div>
    <div class="prac-active" id="pracActive">
      <div class="prac-bar">
        <span class="prac-badge" id="pracBadge"></span>
        <span class="prac-count" id="pracCountEl"></span>
      </div>
      <div class="prac-challenge-card" id="pracCardBody"></div>
      <div class="prac-btns">
        <button class="pb" id="pbEasier" onclick="pracGo(-1)">&#9661; Easier</button>
        <button class="pb" id="pbSame" onclick="pracGo(0)">&#8644; Same Level</button>
        <button class="pb primary" id="pbHarder" onclick="pracGo(1)">&#9651; Harder</button>
        <button class="pb" onclick="pracReset()" style="margin-left:0.8rem;">Restart</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
